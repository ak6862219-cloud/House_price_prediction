<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>House Price Predictor</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 1050px;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 25px;

            padding: 35px;

            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.4);

            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .header p {
            color: #cbd5e1;
            font-size: 16px;
        }

        .form-grid {
            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: bold;
        }

        .input-group input {
            padding: 14px 16px;

            border: 1px solid
                rgba(255, 255, 255, 0.2);

            border-radius: 12px;

            background:
                rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 15px;

            outline: none;

            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #38bdf8;

            box-shadow:
                0 0 0 3px
                rgba(56, 189, 248, 0.15);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .predict-btn {
            width: 100%;

            margin-top: 30px;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background:
                linear-gradient(
                    135deg,
                    #0ea5e9,
                    #2563eb
                );

            color: white;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .predict-btn:hover {
            transform: translateY(-2px);

            box-shadow:
                0 10px 25px
                rgba(37, 99, 235, 0.4);
        }

        .result {
            margin-top: 30px;

            padding: 25px;

            text-align: center;

            border-radius: 18px;

            background:
                rgba(34, 197, 94, 0.12);

            border: 1px solid
                rgba(34, 197, 94, 0.3);
        }

        .result h2 {
            color: #86efac;

            margin-bottom: 10px;
        }

        .price {
            font-size: 34px;

            font-weight: bold;

            color: white;
        }

        .prediction {
            margin-top: 10px;

            color: #cbd5e1;
        }

        .footer {
            text-align: center;

            margin-top: 25px;

            color: #94a3b8;

            font-size: 13px;
        }

        @media (max-width: 700px) {

            .form-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 28px;
            }
        }

    </style>

</head>


<body>

<div class="container">

    <div class="header">

        <h1>🏠 House Price Predictor</h1>

        <p>
            AI-powered California House Price Prediction
        </p>

    </div>


    <form action="/predict" method="post">

        <div class="form-grid">


            <div class="input-group">

                <label>Median Income</label>

                <input
                    type="number"
                    step="any"
                    name="MedInc"
                    placeholder="e.g. 3.5"
                    required
                >

            </div>


            <div class="input-group">

                <label>House Age</label>

                <input
                    type="number"
                    step="any"
                    name="HouseAge"
                    placeholder="e.g. 25"
                    required
                >

            </div>


            <div class="input-group">

                <label>Average Rooms</label>

                <input
                    type="number"
                    step="any"
                    name="AveRooms"
                    placeholder="e.g. 5.5"
                    required
                >

            </div>


            <div class="input-group">

                <label>Average Bedrooms</label>

                <input
                    type="number"
                    step="any"
                    name="AveBedrms"
                    placeholder="e.g. 1.2"
                    required
                >

            </div>


            <div class="input-group">

                <label>Population</label>

                <input
                    type="number"
                    step="any"
                    name="Population"
                    placeholder="e.g. 500"
                    required
                >

            </div>


            <div class="input-group">

                <label>Average Occupancy</label>

                <input
                    type="number"
                    step="any"
                    name="AveOccup"
                    placeholder="e.g. 3"
                    required
                >

            </div>


            <div class="input-group">

                <label>Latitude</label>

                <input
                    type="number"
                    step="any"
                    name="Latitude"
                    placeholder="e.g. 35.5"
                    required
                >

            </div>


            <div class="input-group">

                <label>Longitude</label>

                <input
                    type="number"
                    step="any"
                    name="Longitude"
                    placeholder="e.g. -120.5"
                    required
                >

            </div>


        </div>


        <button
            type="submit"
            class="predict-btn"
        >

            🔮 Predict House Price

        </button>

    </form>


    {% if price %}

    <div class="result">

        <h2>Prediction Result</h2>

        <div class="price">

            {{ price }}

        </div>

        <div class="prediction">

            Model Output:
            {{ prediction }}

        </div>

    </div>

    {% endif %}


    <div class="footer">

        Powered by Machine Learning • Linear Regression

    </div>


</div>

</body>

</html>
